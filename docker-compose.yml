services:
  backend:
    build: ./server
    container_name: alsalahy-backend
    ports:
      - "5000:5000"
    volumes:
      - ./server/db:/app/db
    environment:
      - NODE_ENV=production
      - JWT_SECRET=alsalahy_secret_key_change_me_in_prod
    restart: always

  frontend:
    build:
      context: ./client
      args:
        - VITE_API_BASE=http://localhost:5000/api
    container_name: alsalahy-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
